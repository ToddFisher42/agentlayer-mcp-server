name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

       - name: Deploy to Cloudflare Workers
         uses: cloudflare/wrangler-action@v3
         with:
           apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
           accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
         env:
           NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
           FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
           STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
           STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
           STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_STARTER_PRICE_ID }}
           STRIPE_PRO_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }}
           STRIPE_SCALE_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_SCALE_MONTHLY_PRICE_ID }}

       - name: Publish to MCP Registry
         if: startsWith(github.ref, 'refs/tags/v')
         continue-on-error: true
         run: |
           # Download mcp-publisher CLI
           curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

           # Authenticate using GitHub OIDC (no secrets needed)
           ./mcp-publisher login github-oidc

           # Verify server.json is valid
           ./mcp-publisher validate

           # Publish to MCP Registry
           ./mcp-publisher publish
         env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
