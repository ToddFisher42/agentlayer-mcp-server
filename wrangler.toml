name = "agentlayer-mcp-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Secrets should be set via: wrangler secret put SECRET_NAME
# Required secrets:
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   NEON_DATABASE_URL

[vars]
FIRECRAWL_API_KEY = ""
STRIPE_STARTER_PRICE_ID = ""
STRIPE_PRO_MONTHLY_PRICE_ID = ""
STRIPE_SCALE_MONTHLY_PRICE_ID = ""

[[d1_databases]]
binding = "DB"
database_name = "agentlayer"
database_id = ""

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "" # Create with: wrangler kv namespace create "agentlayer-rate-limits"
