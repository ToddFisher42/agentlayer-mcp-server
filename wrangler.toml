name = "agentlayer-mcp-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# To set secrets: wrangler secret put NEON_DATABASE_URL
# Format: postgres://user:pass@ep-xxx.neon.tech/dbname?sslmode=require

[vars]
FIRECRAWL_API_KEY = ""
STRIPE_SECRET_KEY = ""
STRIPE_STARTER_PRICE_ID = ""
STRIPE_PRO_MONTHLY_PRICE_ID = ""
STRIPE_SCALE_MONTHLY_PRICE_ID = ""

[[d1_databases]]
binding = "DB"
database_name = "agentlayer"
database_id = ""

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "" # Run: wrangler kv:namespace create "RATE_LIMIT_KV"
